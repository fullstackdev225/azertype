<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>AzerType - L'application pour écrire plus vite</title>
        <link rel="stylesheet" href="css/style.css">
        <script src="js/config.js" defer></script>
        <script src="js/script.js" defer></script>
        <script src="js/main.js" defer></script>
    </head>

    <body>
        <header>
            <h1>AzerType</h1>
            <h2>L'application pour écrire plus vite !</h2>
            <p>AzerType est une application en ligne qui permet de taper des mots au clavier :)</p>
        </header><br><br>

        <main>
            <section class="section-game">
                <p>
                    Choisissez une option parmi celles qui s'affichent <br> ci-dessous
                </p>

                <div class="option-lists">
                    <input type="radio" name="option" id="word" value="word">
                    <label for="word">Mots</label>
                    <input type="radio" name="option" id="sentence" value="sentence">
                    <label for="sentence">Phrases</label>
                </div><br>

                <div class="proposition-area">
                </div><br>

                <div class="input-player">
                    <input type="text" name="user-proposition" id="user-proposition">
                    <button id="btn-validate">Valider</button>
                </div><br>

                <div class="score-area">
                    Votre score : <span>0</span>
                </div><br>

                <dialog class="modal">
                    <button id="btn-close-modal">Fermer</button><br><br>
                    <h1>Partager votre score</h1>
                    <form>
                        <label for="name">Veuillez entrer votre nom</label><br>
                        <input type="text" name="name" id="name" required minlength="2" placeholder="Votre nom"><br><br>

                        <label for="mail">A qui voulez-vous envoyez <br>votre score?</label><br>
                        <input type="email" name="mail" id="mail" required placeholder="utilisateur@domaine.com"><br><br>

                        <button type="submit">Envoyer</button>
                    </form>
                </dialog>

                <div class="share">
                    <button id="btn-share">Partager votre score</button>
                </div>
            </section>
        </main><br><br>

        <footer>
            <p>@copyright2026 - AzerType</p>
        </footer>
    </body>
</html>
