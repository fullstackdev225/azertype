<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>AzerType - l'application pour écrire plus vite</title>
        <link rel="stylesheet" href="css/style.css">
        <script src="js/config.js" defer></script>
        <script src="js/script.js" defer></script>
        <script src="js/main.js" defer></script>
    </head>

    <body>
        <header class="header">
            <h1 class="header-title">AzerType</h1>
            <h2 class="header-subtitle">L'application pour écrire plus vite !</h2>
            <p class="header-text">AzerType est une application en ligne qui permet de taper plus vite au clavier :)</p>
        </header><br><br>

        <main>
            <section class="section-game">
                 <p>
                    Choisissez une option parmi celles qui s'affichent <br> ci-dessous.
                 </p><br>

                 <div class="option-list">
                     <input type="radio" name="option" id="word" value="word">
                     <label for="word">Mots</label>
                     <input type="radio" name="option" id="sentence" value="word">
                     <label for="sentence">Phrases</label>
                 </div><br>

                 <div class="proposition-area">
                 </div><br>

                 <div class="game-area">
                    <input type="text" name="user-proposition" id="user-proposition">
                    <button id="btn-validate" class="btn">Valider</button><br>
                    <div class="error-message"></div>
                 </div><br>

                 <div class="score-area">
                    Votre score : <span>0</span>
                 </div><br>

                 <dialog class="modal">
                     <button id="btn-close" class="btn">Fermer</button>

                     <h1>Partager votre score</h1>

                     <form class="form">
                         <div class="form-section">
                            <label for="user-name">Entrez votre nom</label><br>
                            <input type="text" name="user-name" id="user-name" minlength="2" required>
                         </div><br>

                         <div class="form-section">
                            <label for="user-email">A qui voulez-vous envoyer <br> votre score?</label><br>
                            <input type="email" name="user-email" id="user-email" required placeholder="Adresse e-mail du destinataire"><br>
                            <div class="error-email"></div>
                         </div><br>

                         <div class="form-section">
                             <button type="submit" id="btn-send" class="btn">Envoyer</button>
                         </div>
                     </form>
                 </dialog>

                 <div class="share-area">
                    <button id="btn-share" class="btn">Partager</button>
                 </div>
            </section>
        </main><br><br>

        <footer class="footer">
            <p class="footer-text">@copyright2024 - AzerType : <span>Digital Services</span></p>
        </footer>
    </body>
</html>
