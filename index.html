<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AzerType - L'application pour écrire plus vite</title>
        <link rel="stylesheet" href="css/style.css">
        <script src="js/config.js" defer></script>
        <script src="js/script.js" defer></script>
        <script src="js/main.js" defer></script>
    </head>

    <body>
        <header>
             <h1>AzerType</h1>
             <h2>L'application pour écrire plus vite !</h2>
             <p>AzerType est une application en ligne qui permet d'écrire plus vite au clavier !</p>
        </header><br><br>

        <main>
            <section>
                 <p>Choisissez une option parmi celles qui s'affichent <br> ci-dessous.</p>

                 <div class="option-list">
                    <input type="radio" name="option" id="word" value="word">
                    <label for="word">Mots</label>
                    <input type="radio" name="option" id="sentence" value="sentence">
                    <label for="sentence">Phrases</label>
                 </div><br>

                 <div class="proposition-area">
                 </div><br>

                 <div class="game-area">
                    <input type="text" name="user-proposition" id="user-proposition">
                    <button class="btn" id="btn-validate">Valider</button><br>
                    <div class="error-message"></div>
                 </div><br>

                 <div class="score-area">
                    Votre score est : <span>0</span>
                 </div><br>

                 <dialog>
                     <button class="btn" id="btn-close">Fermer</button>

                     <h1>Partager votre score</h1>

                     <form>
                         <div class="form-section">
                            <label for="user-name">Entrez votre nom</label><br>
                            <input type="text" name="user-name" id="user-name" minlength="2" required>
                         </div><br>

                         <div class="form-section">
                            <label for="user-email">A qui voulez-vous partager <br> votre score?</label><br>
                            <input type="email" name="user-email" id="user-email" required placeholder="example@domaine.com"><br>
                            <div class="email-error"></div>
                         </div><br>

                         <div class="form-section">
                            <button type="submit" class="btn" id="btn-send">Envoyer</button>
                         </div>
                     </form>
                 </dialog>

                 <div class="share-area">
                    <button class="btn" id="btn-share">Partager</button>
                 </div>
            </section>
        </main><br><br>

        <footer>
            <p>@copyright2024 - AzerType : <span>Digital Services</span></p>
        </footer>
    </body>
</html>
